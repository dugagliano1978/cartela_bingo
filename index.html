<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leia o QR Code para Jogar!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #f1c40f;
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 40px;
        }

        .qr-container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* A imagem do QR Code em si */
        img {
            width: 300px;
            height: 300px;
        }

        .instrucao {
            margin-top: 20px;
            color: #34495e;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <h1>Pegue sua Cartela!</h1>
    <p>Aponte a câmera do seu celular para o código abaixo:</p>

    <div class="qr-container">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=SEU_LINK_AQUI" alt="QR Code do Bingo">
        <div class="instrucao">Escaneie para jogar</div>
    </div>

</body>
</html>
